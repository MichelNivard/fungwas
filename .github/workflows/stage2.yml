name: Stage2

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stage2-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Install Stage 2 dependencies
        run: |
          Rscript -e 'install.packages(c("Rcpp", "RcppArmadillo", "data.table", "ggplot2"), repos = "https://cloud.r-project.org")'

      - name: Install fungwasStage2
        run: |
          R CMD INSTALL stage2

      - name: Run fast Stage 2 regression scripts
        run: |
          /usr/bin/time -p Rscript stage2/tests/test-cov-ids-mandatory.R
          /usr/bin/time -p Rscript stage2/tests/test-model-tournament.R
